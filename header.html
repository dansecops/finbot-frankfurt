<style>
:root { --bg: #ffffff; --fg: #1a1a1a; --accent: #608f3a; --accent-dark: #4d7330; --code-bg: #f5f5f5; --border: #e0e0e0; --muted: #666; }
* { box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Helvetica Neue", Arial, sans-serif; font-size: 16px; line-height: 1.6; color: var(--fg); background: var(--bg); margin: 0 auto; padding: 1.5rem; max-width: 760px; }
h1 { font-size: 1.7rem; border-bottom: 3px solid var(--accent); padding-bottom: 0.4rem; margin-top: 0.2rem; }
h2 { font-size: 1.35rem; color: var(--accent-dark); margin-top: 2.4rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3rem; }
h3 { font-size: 1.1rem; margin-top: 1.6rem; }
h4 { font-size: 1rem; margin-top: 1.2rem; color: var(--muted); }
p, li { font-size: 1rem; }
code { font-family: "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; background: var(--code-bg); padding: 0.1em 0.35em; border-radius: 3px; font-size: 0.88em; }
pre { background: var(--code-bg); border: 1px solid var(--border); border-radius: 4px; padding: 0.85rem 1rem; overflow-x: auto; font-size: 0.85rem; line-height: 1.5; }
pre code { background: transparent; padding: 0; font-size: inherit; }
a { color: var(--accent-dark); text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 2px; }
a:hover { color: var(--accent); }
table { border-collapse: collapse; width: 100%; margin: 1rem 0; font-size: 0.92rem; }
th, td { border: 1px solid var(--border); padding: 0.45rem 0.7rem; text-align: left; vertical-align: top; }
th { background: #f9f9f9; font-weight: 600; }
blockquote { border-left: 4px solid var(--accent); margin: 1rem 0; padding: 0.5rem 1rem; background: #fafaf6; color: #444; }
blockquote p { margin: 0.4rem 0; }
hr { border: 0; border-top: 1px solid var(--border); margin: 2.5rem 0; }
ol, ul { padding-left: 1.6rem; }
li { margin: 0.25rem 0; }
strong { color: var(--fg); }
@media (max-width: 600px) { body { padding: 1rem; font-size: 15px; } pre { font-size: 0.78rem; padding: 0.6rem 0.7rem; } h1 { font-size: 1.45rem; } h2 { font-size: 1.2rem; margin-top: 2rem; } h3 { font-size: 1.05rem; } table { font-size: 0.82rem; } th, td { padding: 0.35rem 0.5rem; } }
@media print { body { max-width: none; padding: 0.5in; } a { color: var(--fg); } pre { white-space: pre-wrap; word-wrap: break-word; } }
.signup-cta { display: inline-block; padding: 14px 28px; margin: 18px 0 28px 0; font-size: 1.1em; font-weight: 700; color: #ffffff !important; background-color: #0998ff; border-radius: 6px; text-decoration: none; border: 2px solid #0078cc; }
.signup-cta:hover { background-color: #0078cc; }
</style>
